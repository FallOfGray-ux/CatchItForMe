<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1033" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Catch It For Me</title>

  <!-- React + Babel via CDN. No build step. Just open this file in a browser. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* =========================================================
       Catch It For Me — v2 polished mobile-game styles
       Mobile-first. Neon / candy palette. Big tap targets.
       ========================================================= */

    :root {
      --accent:       #ff2d6f;
      --accent-2:     #ffd23f;
      --accent-3:     #29e3ff;
      --purple:       #7b2cff;
      --ink:          #140a2e;
      --ink-2:        #1f0f42;
      --radius:       18px;
      --shadow-soft:  0 10px 30px rgba(0,0,0,0.35);
      --pad-top:      max(14px, env(safe-area-inset-top));
      --pad-bottom:   max(18px, env(safe-area-inset-bottom));
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body, #root {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI Variable", system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
      color: #fff;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      color: inherit;
    }

    /* ---------- App shell ---------- */
    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: #fff;
    }

    /* Dynamic theme backgrounds with layered gradients + animated orbs */
    .bg-basic    { background: radial-gradient(120% 80% at 20% 10%, #ffc8a2 0%, transparent 55%),
                              radial-gradient(120% 80% at 90% 90%, #ff6ea1 0%, transparent 60%),
                              linear-gradient(160deg, #ffb273 0%, #ff5e8a 55%, #c23d8e 100%); }
    .bg-luxury   { background: radial-gradient(120% 80% at 15% 15%, #ffe493 0%, transparent 55%),
                              radial-gradient(120% 80% at 85% 85%, #ff9a2c 0%, transparent 60%),
                              linear-gradient(160deg, #ffd93b 0%, #ff8a00 100%); }
    .bg-haunted  { background: radial-gradient(120% 80% at 20% 20%, #4b2a7a 0%, transparent 50%),
                              radial-gradient(120% 80% at 80% 80%, #22c1c3 0%, transparent 55%),
                              linear-gradient(160deg, #0e1038 0%, #1a0933 50%, #081327 100%); }
    .bg-neon     { background: radial-gradient(120% 80% at 10% 20%, #ff2d95 0%, transparent 55%),
                              radial-gradient(120% 80% at 90% 85%, #29e3ff 0%, transparent 55%),
                              linear-gradient(160deg, #2b0a3d 0%, #0b0524 50%, #170645 100%); }

    /* Slow-drifting orbs layer for depth */
    .orbs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.55;
      animation: floatOrb 18s ease-in-out infinite;
    }
    .orb.a { width: 280px; height: 280px; background: #ff2d95; top: -80px; left: -60px; }
    .orb.b { width: 320px; height: 320px; background: #29e3ff; bottom: -100px; right: -80px; animation-duration: 22s; animation-delay: -6s; }
    .orb.c { width: 220px; height: 220px; background: #ffd23f; top: 40%; left: 60%; animation-duration: 26s; animation-delay: -12s; opacity: 0.4; }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(40px, -30px) scale(1.15); }
    }

    /* Grain noise overlay (cheap, just dots) */
    .app::after {
      content: "";
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      animation: drift 22s linear infinite;
      z-index: 1;
    }
    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 220px 220px; }
    }

    /* ---------- Top HUD ---------- */
    .top-bar {
      position: absolute;
      top: var(--pad-top); left: 0; right: 0;
      padding: 0 14px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 30;
      pointer-events: none;
    }
    .pill {
      background: rgba(20, 10, 46, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 16px;
      display: flex; align-items: center; gap: 6px;
      pointer-events: auto;
      box-shadow: var(--shadow-soft);
      color: #fff;
      letter-spacing: 0.3px;
    }
    .coin-pill .count {
      display: inline-block;
      transition: transform 0.22s cubic-bezier(.2, 1.6, .4, 1);
    }
    .coin-pill.bump .count { transform: scale(1.35); color: var(--accent-2); text-shadow: 0 0 8px rgba(255,210,63,0.6); }

    .streak-pill {
      background: linear-gradient(135deg, #ff5f6d 0%, #ff9f2d 100%);
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 6px 20px rgba(255, 95, 109, 0.45);
      animation: streakPulse 1.6s ease-in-out infinite;
    }
    @keyframes streakPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 6px 20px rgba(255, 95, 109, 0.45); }
      50%      { transform: scale(1.06); box-shadow: 0 8px 28px rgba(255, 159, 45, 0.6); }
    }

    .timer-wrap {
      position: absolute;
      top: calc(var(--pad-top) + 56px);
      left: 14px; right: 14px;
      z-index: 30;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .timer-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
    }
    .timer-bar > span {
      display: block; height: 100%;
      background: linear-gradient(90deg, #29e3ff, #ffd23f, #ff2d6f);
      border-radius: inherit;
      transition: width 0.12s linear;
      box-shadow: 0 0 8px rgba(255, 210, 63, 0.5);
    }
    .timer-bar.low > span { background: linear-gradient(90deg, #ff2d6f, #ff5f6d, #ff2d6f); animation: flash 0.35s infinite; }
    @keyframes flash { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }

    /* ---------- Screens ---------- */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(var(--pad-top) + 56px) 22px var(--pad-bottom);
      gap: 16px;
      z-index: 10;
      animation: screenIn 0.38s cubic-bezier(.2, 1.2, .3, 1);
    }
    @keyframes screenIn {
      0%   { opacity: 0; transform: translateY(14px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .screen h1 {
      font-size: clamp(40px, 11vw, 56px);
      margin: 0;
      text-align: center;
      letter-spacing: -1.5px;
      font-weight: 900;
      background: linear-gradient(180deg, #fff 0%, #ffd23f 60%, #ff8a00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0,0,0,0.15);
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.18)) drop-shadow(0 14px 22px rgba(255,120,60,0.35));
    }
    .screen h2 {
      font-size: 26px;
      margin: 0;
      text-align: center;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }
    .screen p {
      margin: 0; text-align: center;
      opacity: 0.92; font-size: 15px;
      font-weight: 600;
      max-width: 320px; line-height: 1.35;
    }

    /* ---------- Buttons ---------- */
    .btn {
      min-height: 58px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 900;
      border-radius: 18px;
      color: #fff;
      background: linear-gradient(180deg, #ff5f8a 0%, #ff2d6f 100%);
      box-shadow:
        0 6px 0 #a10038,
        0 12px 28px rgba(255, 45, 111, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.2s;
      min-width: 220px;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    .btn::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 40%);
      border-radius: inherit;
      pointer-events: none;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a10038, 0 4px 10px rgba(255,45,111,0.35); }
    .btn.secondary { background: linear-gradient(180deg, #29e3ff 0%, #0099ff 100%); box-shadow: 0 6px 0 #0055a8, 0 12px 28px rgba(0, 153, 255, 0.4), inset 0 1px 0 rgba(255,255,255,0.25); }
    .btn.secondary:active { box-shadow: 0 2px 0 #0055a8, 0 4px 10px rgba(0,153,255,0.35); }
    .btn.ghost { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 4px 0 rgba(0,0,0,0.3); backdrop-filter: blur(8px); }
    .btn.ghost:active { box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
    .btn.huge { min-width: 260px; font-size: 22px; min-height: 70px; border-radius: 22px; }
    .btn:disabled { opacity: 0.55; filter: grayscale(0.6); }

    /* ---------- Cat ---------- */
    .cat {
      font-size: 112px;
      line-height: 1;
      position: relative;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2)) drop-shadow(0 14px 22px rgba(0,0,0,0.35));
      transition: transform 0.2s ease;
    }
    .cat.idle { animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50%      { transform: rotate(3deg) scale(1.04); }
    }
    .cat.corner {
      position: absolute;
      top: 14px; left: 10px;
      font-size: 62px;
      z-index: 5;
      animation: breathe 3s ease-in-out infinite;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5));
    }

    /* Speech bubble */
    .bubble {
      position: relative;
      background: #fff;
      color: #150a2e;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 290px;
      font-weight: 700;
      font-size: 15.5px;
      line-height: 1.3;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(0,0,0,0.04);
      animation: bubblePop 0.32s cubic-bezier(.2, 1.8, .3, 1);
      letter-spacing: 0.1px;
    }
    .bubble::after {
      content: "";
      position: absolute;
      bottom: -10px; left: 28px;
      border: 11px solid transparent;
      border-top-color: #fff;
      border-bottom: 0;
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.15));
    }
    .bubble.corner { max-width: 220px; font-size: 13.5px; padding: 10px 13px; }
    .bubble.corner::after { left: 18px; bottom: -8px; border-width: 9px; }
    @keyframes bubblePop {
      0%   { transform: scale(0.55) rotate(-4deg); opacity: 0; }
      70%  { transform: scale(1.06) rotate(1deg);  opacity: 1; }
      100% { transform: scale(1) rotate(0);       opacity: 1; }
    }

    /* Hold-for-combo glow around cat during streak */
    .cat.streaking {
      filter: drop-shadow(0 0 14px rgba(255, 159, 45, 0.9))
              drop-shadow(0 10px 18px rgba(0,0,0,0.4));
    }

    /* ---------- Mouse ---------- */
    .mouse {
      position: absolute;
      font-size: 54px;
      line-height: 1;
      z-index: 8;
      transform: translate(-50%, -50%);
      cursor: pointer;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
      animation: spawnPop 0.28s cubic-bezier(.2, 1.8, .3, 1), wiggle 0.5s ease-in-out 0.28s infinite alternate;
    }
    @keyframes wiggle {
      from { transform: translate(-50%, -50%) rotate(-6deg); }
      to   { transform: translate(-50%, -50%) rotate(6deg); }
    }
    @keyframes spawnPop {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-40deg); opacity: 0; }
      70%  { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0);      opacity: 1; }
    }
    .mouse.rare {
      filter: drop-shadow(0 0 14px gold) drop-shadow(0 0 28px #ff9f2d) drop-shadow(0 6px 8px rgba(0,0,0,0.4));
      animation: spawnPop 0.28s cubic-bezier(.2, 1.8, .3, 1),
                 wiggle 0.32s ease-in-out 0.28s infinite alternate,
                 sparkle 1.1s linear 0.28s infinite;
    }
    @keyframes sparkle {
      0%, 100% { text-shadow: 0 0 0 gold; }
      50%      { text-shadow: 0 0 22px gold, 0 0 44px orange; }
    }

    /* Little dust puff where the mouse lands */
    .puff {
      position: absolute;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 70%);
      transform: translate(-50%, -50%) scale(0.2);
      animation: puffOut 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 7;
    }
    @keyframes puffOut {
      0%   { opacity: 0.9; transform: translate(-50%, -50%) scale(0.2); }
      100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.5); }
    }

    /* Floating coin popup */
    .coin-pop {
      position: absolute;
      font-size: 24px;
      font-weight: 900;
      color: #ffd23f;
      text-shadow: 2px 2px 0 #6b3a00, 0 0 12px rgba(255,210,63,0.8);
      pointer-events: none;
      animation: floatPop 1s cubic-bezier(.2,1.6,.3,1) forwards;
      z-index: 30;
      letter-spacing: 0.5px;
    }
    @keyframes floatPop {
      0%   { transform: translate(-50%, -50%) translateY(0)  scale(0.4); opacity: 0; }
      25%  { transform: translate(-50%, -50%) translateY(-10px) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateY(-100px) scale(1);   opacity: 0; }
    }

    /* ---------- Confetti ---------- */
    .confetti-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px; height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiBurst 1.1s ease-out forwards;
    }
    @keyframes confettiBurst {
      0%   { transform: translate(-50%, -50%) rotate(0) scale(0.8); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--tr)) scale(1); opacity: 0; }
    }

    /* ---------- Screen shake ---------- */
    .shake { animation: shake 0.55s cubic-bezier(.36,.07,.19,.97); }
    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX( 4px); }
      30%, 50%, 70% { transform: translateX(-8px); }
      40%, 60% { transform: translateX( 8px); }
    }

    /* ---------- Shop ---------- */
    .shop {
      position: absolute; inset: 0;
      background: rgba(8, 3, 28, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      padding: calc(var(--pad-top) + 60px) 14px var(--pad-bottom);
      z-index: 50;
      animation: screenIn 0.34s cubic-bezier(.2, 1.2, .3, 1);
    }
    .shop h2 {
      margin: 0 0 4px;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      text-align: center;
      font-size: 28px;
    }
    .shop .sub {
      text-align: center; font-weight: 700; font-size: 14px;
      color: rgba(255,255,255,0.85); margin-bottom: 10px;
    }
    .tabs { display: flex; gap: 8px; margin: 6px 0 12px; }
    .tab {
      flex: 1;
      padding: 11px 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 14px;
      font-weight: 800;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.12s ease, background 0.18s;
    }
    .tab.active {
      background: #fff;
      color: var(--ink);
      border-color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .shop-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      overflow-y: auto;
      padding-bottom: 12px;
    }
    .shop-item {
      background: rgba(255,255,255,0.96);
      color: var(--ink);
      border-radius: 18px;
      padding: 14px 10px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      text-align: center;
      position: relative;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      animation: itemIn 0.3s cubic-bezier(.2,1.5,.3,1) both;
    }
    .shop-item:nth-child(1) { animation-delay: 0.00s; }
    .shop-item:nth-child(2) { animation-delay: 0.04s; }
    .shop-item:nth-child(3) { animation-delay: 0.08s; }
    .shop-item:nth-child(4) { animation-delay: 0.12s; }
    @keyframes itemIn {
      0%   { opacity: 0; transform: translateY(14px) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .shop-item .emoji { font-size: 52px; line-height: 1; }
    .shop-item .name { font-weight: 900; font-size: 14px; letter-spacing: 0.2px; }
    .shop-item .price { font-size: 13px; font-weight: 800; color: #c4851a; }
    .shop-item .btn-sm {
      margin-top: 4px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      border-radius: 12px;
      background: linear-gradient(180deg, #29e3ff, #0099ff);
      color: #fff;
      min-height: 38px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
      letter-spacing: 0.3px;
    }
    .shop-item .btn-sm:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    .shop-item.locked .btn-sm { background: linear-gradient(180deg, #ffd36a, #ffb743); color: #5a3b00; }
    .shop-item.equipped .btn-sm { background: #aaa; }
    .shop-item.owned .btn-sm { background: linear-gradient(180deg, #7ae25e, #3ba329); }

    .badge {
      position: absolute;
      top: 8px; right: 8px;
      background: linear-gradient(180deg, #7ae25e, #3ba329);
      color: white;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 8px;
      font-weight: 900;
      letter-spacing: 0.6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .close-x {
      position: absolute;
      top: calc(var(--pad-top) + 10px); right: 14px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      z-index: 60;
      box-shadow: var(--shadow-soft);
    }

    .home-stack { display: flex; flex-direction: column; gap: 14px; align-items: center; width: 100%; max-width: 340px; }

    /* ---------- Result screen ---------- */
    .result-big {
      font-size: clamp(60px, 17vw, 96px);
      font-weight: 900;
      letter-spacing: -3px;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.3), 0 14px 24px rgba(0,0,0,0.35);
      margin-bottom: 0;
      animation: bigIn 0.5s cubic-bezier(.2,1.8,.3,1);
    }
    @keyframes bigIn {
      0%   { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      60%  { transform: scale(1.15) rotate(3deg);  opacity: 1; }
      100% { transform: scale(1) rotate(0);        opacity: 1; }
    }
    .result-big.win  {
      background: linear-gradient(180deg, #fff 0%, #ffd23f 60%, #ff8a00 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2));
    }
    .result-big.fail { color: #ff5c5c; }
    .reward {
      background: rgba(20,10,46,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 12px 22px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .bouncy { animation: bounce 2.6s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* Fallback while booting */
    #boot-warning {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; color: #222;
      font-family: system-ui, sans-serif;
      background: #ffd36a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot-warning">
      Loading… If this sticks around, your browser may be blocking the React CDN (check your internet).
    </div>
  </div>

  <script type="text/babel" data-type="module">
    /* =============================================================
       Catch It For Me v2 — polished, TikTok-voiced sarcastic cat

    const CAT_SKINS = [

    /* -------- 2. SOUND + HAPTICS -------- */
    const audioCtxRef = { current: null };
    function beep(tone = "sine", freq = 660, dur = 0.08, vol = 0.15) {
      try {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioCtxRef.current;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = tone;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
        osc.stop(ctx.currentTime + dur);
      } catch (e) { /* audio non-critical */ }
    }
    function haptic(pattern = 12) {
      try { if (navigator.vibrate) navigator.vibrate(pattern); } catch {}
    }

    /* -------- 3. Confetti helper -------- */
    // Generate a burst of ~36 confetti with random directions.
    function Confetti({ keySeed }) {
      const pieces = useMemo(() => {
        const colors = ["#ff2d6f", "#ffd23f", "#29e3ff", "#7b2cff", "#7ae25e", "#fff"];
        return new Array(36).fill(0).map((_, i) => {
          const angle = Math.random() * Math.PI * 2;
          const dist  = 120 + Math.random() * 220;
          return {
            id: i,
            color: colors[i % colors.length],
            tx: `${Math.cos(angle) * dist}px`,
            ty: `${Math.sin(angle) * dist}px`,
            tr: `${(Math.random() * 720 - 360)}deg`,
            delay: `${Math.random() * 0.08}s`,
          };
        });
      }, [keySeed]);
      return (
        <div className="confetti-wrap" key={keySeed}>
          {pieces.map(p => (
            <span
              key={p.id}
              className="confetti"
              style={{
                background: p.color,
                "--tx": p.tx,
                "--ty": p.ty,
                "--tr": p.tr,
                animationDelay: p.delay,
              }}
            />
          ))}
        </div>
      );
    }

    /* -------- 4. CatCharacter -------- */
    function CatCharacter({ skinId, message, corner = false, streaking = false }) {
      const skin = CAT_SKINS.find((s) => s.id === skinId) || CAT_SKINS[0];
      return (

          {message && (
            <div className={`bubble ${corner ? "corner" : ""}`} key={message}>
              {message}
            </div>
          )}
          <div className={`cat ${corner ? "corner" : "idle"} ${streaking ? "streaking" : ""}`}
               style={corner ? { position: "static", fontSize: 62 } : null}>
            {skin.emoji}
          </div>
        </div>
      );
    }

    /* -------- 5. Mouse -------- */
    function Mouse({ x, y, rare, onTap }) {
      return (
        <>
          <span className="puff" style={{ left: `${x}%`, top: `${y}%` }} key={`${x}-${y}-puff`} />
          <div
            className={`mouse ${rare ? "rare" : ""}`}
            style={{ left: `${x}%`, top: `${y}%` }}
            onClick={onTap}
            onTouchStart={(e) => { e.preventDefault(); onTap(); }}
            role="button"
            aria-label="mouse"
          >
            {rare ? "🐭" : "🐁"}

        </>

    /* -------- 6. HomeScreen -------- */
    function HomeScreen({ skinId, coins, onStart, onShop, firstEver }) {
      const [msg, setMsg] = useState(() => pick(firstEver ? CAT_LINES.first_ever : CAT_LINES.home));
      const idleRef = useRef(null);

      // If player stays on home > 8s, cat nags again.
      useEffect(() => {
        idleRef.current = setTimeout(() => setMsg(pick(CAT_LINES.idle_too_long)), 8500);
        return () => clearTimeout(idleRef.current);
      }, [msg]);

      return (
        <div className="screen">
          <h1 className="bouncy">Catch It For Me</h1>
          <p>Your cat refuses to do its job. Tap the mouse before it escapes.</p>
          <CatCharacter skinId={skinId} message={msg} />
          <div className="home-stack">
            <button className="btn huge" onClick={() => { haptic(18); onStart(); }}>
              Start Hunt 🐭

    /* -------- 7. GameScreen -------- */
    function GameScreen({ skinId, roundNumber, streak, soundTone, onFinish }) {
      const durationMs = useMemo(() => 5000 + Math.random() * 5000, [roundNumber]);
      const jumpMs = useMemo(
        () => clamp(1100 - roundNumber * 60, 300, 1200) - Math.random() * 200,
        [roundNumber]
      );
      const isRare = useMemo(() => Math.random() < 0.14, [roundNumber]);

      const [pos, setPos] = useState({ x: 50, y: 60 });
      const [remaining, setRemaining] = useState(durationMs);
      const [startedAt] = useState(() => performance.now());
      const [coinPop, setCoinPop] = useState(null);
      const [startMsg, setStartMsg] = useState(() => pick(isRare ? CAT_LINES.round_start_rare : CAT_LINES.round_start));
      const finishedRef = useRef(false);
      const midFiredRef = useRef(false);
      const lowFiredRef = useRef(false);

      // Opener fades out after ~1.8s
      useEffect(() => {
        const t = setTimeout(() => setStartMsg(null), 1800);
        return () => clearTimeout(t);
      }, []);

      const reposition = useCallback(() => {
        setPos({ x: 10 + Math.random() * 80, y: 30 + Math.random() * 55 });
      }, []);

      useEffect(() => {
        reposition();
        const jumpTimer = setInterval(reposition, jumpMs);
        return () => clearInterval(jumpTimer);
      }, [jumpMs, reposition]);

      useEffect(() => {
        const tick = setInterval(() => {
          const elapsed = performance.now() - startedAt;
          const left = durationMs - elapsed;

          // Mid-round taunt (~50%)
          if (!midFiredRef.current && elapsed > durationMs * 0.5) {
            midFiredRef.current = true;
            setStartMsg(pick(CAT_LINES.mid_round));
            setTimeout(() => setStartMsg(null), 1500);
          }
          // Time-low taunt
          if (!lowFiredRef.current && left < 2000) {
            lowFiredRef.current = true;
            setStartMsg(pick(CAT_LINES.time_low));
            setTimeout(() => setStartMsg(null), 1400);
          }

          if (left <= 0) {
            clearInterval(tick);
            if (!finishedRef.current) {
              finishedRef.current = true;
              haptic([40, 60, 40]);
              onFinish({ caught: false, rare: isRare });
            }
          } else {
            setRemaining(left);
          }
        }, 100);
        return () => clearInterval(tick);
      }, [durationMs, startedAt, onFinish, isRare]);

      const handleTap = () => {
        if (finishedRef.current) return;
        finishedRef.current = true;
        beep(soundTone, isRare ? 1100 : 880, 0.14, 0.22);
        haptic(isRare ? [10, 40, 10, 40, 20] : 25);
        setCoinPop({ x: pos.x, y: pos.y, text: isRare ? "+50" : "+10" });
        setTimeout(() => onFinish({ caught: true, rare: isRare }), 480);
      };

      const secondsLeft = Math.max(0, remaining / 1000);
      const pct = clamp((remaining / durationMs) * 100, 0, 100);

      return (
        <div className="screen" style={{ justifyContent: "flex-start", paddingTop: "calc(var(--pad-top) + 110px)" }}>
          <CatCharacter skinId={skinId} message={startMsg} corner streaking={streak >= 2} />
          <Mouse x={pos.x} y={pos.y} rare={isRare} onTap={handleTap} />
          {coinPop && (
            <div className="coin-pop" style={{ left: `${coinPop.x}%`, top: `${coinPop.y}%` }}>
              {coinPop.text} 🪙
            </div>
          )}

          <div className="timer-wrap">
            <div className={`timer-bar ${secondsLeft < 2 ? "low" : ""}`}>
              <span style={{ width: `${pct}%` }} />
            </div>
          </div>
        </div>
      );
    }

    /* -------- 8. ResultScreen -------- */
    function ResultScreen({ skinId, won, rare, coinsEarned, streak, prevStreak, onAgain, onHome, onShare }) {
      const [msg] = useState(() => {
        if (won) {
          if (rare) return pick(CAT_LINES.win_rare);
          if (streak >= 3) return pick(CAT_LINES.win_streak_3);
          if (streak === 2) return pick(CAT_LINES.win_streak_2);
          return pick(CAT_LINES.win);
        } else {
          if (rare) return pick(CAT_LINES.fail_rare);
          if (prevStreak >= 2) return pick(CAT_LINES.fail_streak_3);
          if (prevStreak === 1) return pick(CAT_LINES.fail_streak_2);
          return pick(CAT_LINES.fail);
        }
      });

      return (
        <div className={`screen ${won ? "" : "shake"}`}>
          {won && <Confetti keySeed={coinsEarned + streak} />}
          <h1 className={`result-big ${won ? "win" : "fail"}`}>
            {won ? "CAUGHT!" : "ESCAPED!"}
          </h1>
          <CatCharacter skinId={skinId} message={msg} streaking={streak >= 2} />
          {won && (
            <div className="reward">
              <div style={{ fontSize: 22, fontWeight: 900, color: "#ffd23f" }}>
                +{coinsEarned} 🪙 {rare && <span style={{ color: "#ff8a00" }}>(RARE!)</span>}
              </div>
              {streak > 1 && (
                <div style={{ fontSize: 14, marginTop: 4, opacity: 0.95 }}>
                  {"🔥".repeat(Math.min(5, streak))} streak ×{streak}
                </div>
              )}
            </div>
          )}
          <div className="home-stack">
            <button className="btn" onClick={() => { haptic(14); onAgain(); }}>Play Again</button>
            <button className="btn secondary" onClick={() => { haptic(12); onHome(); }}>Home</button>
            <button className="btn ghost" onClick={onShare}>Share Result 📤</button>
          </div>
        </div>
      );
    }

    /* -------- 9. ShopScreen -------- */
    function ShopScreen({ coins, skinId, bgId, soundId, owned, onClose, onBuy, onEquip }) {
      const [tab, setTab] = useState("skins");
      const [catMsg, setCatMsg] = useState(() => pick(CAT_LINES.shop_open));

      const catalog = tab === "skins" ? CAT_SKINS
                    : tab === "backgrounds" ? BACKGROUNDS
                    : SOUND_PACKS;
      const equippedId = tab === "skins" ? skinId : tab === "backgrounds" ? bgId : soundId;
      const ownedSet = owned[tab];

      return (
        <div className="shop">
          <button className="close-x" onClick={() => { haptic(10); onClose(); }} aria-label="close">✕</button>
          <h2>Shop</h2>
          <div className="sub">🪙 {coins}</div>

          {/* Cat commenting on your shopping habits */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
            <div className="bubble corner" style={{ maxWidth: 280 }}>{catMsg}</div>
          </div>

          <div className="tabs">
            {[
              { id: "skins",       label: "Skins 🐾" },
              { id: "backgrounds", label: "Rooms 🏠" },
              { id: "sounds",      label: "Sounds 🔊" },
            ].map((t) => (
              <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`}
                onClick={() => { haptic(8); setTab(t.id); }}>
                {t.label}
              </button>
            ))}
          </div>

          <div className="shop-grid" key={tab /* retrigger item stagger */}>
            {catalog.map((item) => {
              const isOwned = ownedSet.has(item.id);
              const isEquipped = equippedId === item.id;
              const canAfford = coins >= item.price;
              const cls = isEquipped ? "equipped" : isOwned ? "owned" : "locked";
              const preview =
                tab === "skins" ? item.emoji
                : tab === "backgrounds" ? (
                    <div className={item.className} style={{ width: 64, height: 64, borderRadius: 14, boxShadow: "inset 0 0 0 2px rgba(0,0,0,0.1)" }} />
                  )
                : "🔊";

              const handleAction = () => {
                if (isEquipped) return;
                if (isOwned) {
                  onEquip(tab, item.id);
                  setCatMsg(pick(CAT_LINES.shop_equip));
                } else if (canAfford) {
                  onBuy(tab, item);
                  setCatMsg(pick(CAT_LINES.shop_buy));
                } else {
                  setCatMsg(pick(CAT_LINES.shop_cant_afford));
                }
                haptic(12);
              };

              return (
                <div className={`shop-item ${cls}`} key={item.id}>
                  {isEquipped && <span className="badge">IN USE</span>}
                  <div className="emoji">{preview}</div>
                  <div className="name">{item.name}</div>
                  <div className="price">{item.price === 0 ? "Free" : `🪙 ${item.price}`}</div>
                  <button className="btn-sm"
                    disabled={isEquipped || (!isOwned && !canAfford)}
                    onClick={handleAction}>
                    {isEquipped ? "Equipped" : isOwned ? "Equip" : (canAfford ? "Buy" : "Locked")}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* -------- 10. App (root) -------- */
    function App() {
      const loadSaved = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const s = JSON.parse(raw);
          return {
            ...s,
            owned: {
              skins:       new Set(s.owned?.skins       ?? ["default"]),
              backgrounds: new Set(s.owned?.backgrounds ?? ["basic"]),
              sounds:      new Set(s.owned?.sounds      ?? ["default"]),
            },
          };
        } catch { return null; }
      };
      const saved = loadSaved();
      const firstEver = !saved;

      const [screen, setScreen]     = useState("home");
      const [shopOpen, setShopOpen] = useState(false);
      const [coins, setCoins]       = useState(saved?.coins ?? 0);
      const [skinId, setSkinId]     = useState(saved?.skinId ?? "default");
      const [bgId, setBgId]         = useState(saved?.bgId ?? "basic");
      const [soundId, setSoundId]   = useState(saved?.soundId ?? "default");
      const [owned, setOwned]       = useState(saved?.owned ?? {
        skins:       new Set(["default"]),
        backgrounds: new Set(["basic"]),
        sounds:      new Set(["default"]),
      });

      const [round, setRound]       = useState(1);
      const [streak, setStreak]     = useState(0);
      const [lastResult, setLastResult] = useState(null);

      // Coin bump animation trigger
      const [coinBump, setCoinBump] = useState(false);
      const bumpCoins = (n) => {
        setCoins((c) => c + n);
        setCoinBump(true);
        setTimeout(() => setCoinBump(false), 260);
      };

      useEffect(() => {
        const payload = {
          coins, skinId, bgId, soundId,
          owned: {
            skins:       [...owned.skins],
            backgrounds: [...owned.backgrounds],
            sounds:      [...owned.sounds],
          },
        };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch {}
      }, [coins, skinId, bgId, soundId, owned]);

      const soundTone = useMemo(() =>
        (SOUND_PACKS.find(s => s.id === soundId) || SOUND_PACKS[0]).tone,
        [soundId]
      );

      const startGame = () => {
        beep(soundTone, 520, 0.08);
        setScreen("game");
      };

      const finishGame = ({ caught, rare }) => {
        let earned = 0;
        const prevStreak = streak;
        let newStreak = streak;
        if (caught) {
          earned = rare ? 50 : 10;
          newStreak = streak + 1;
          if (newStreak > 1) earned += clamp((newStreak - 1) * 2, 0, 20);
          bumpCoins(earned);
          setStreak(newStreak);
          beep(soundTone, 980, 0.15, 0.25);
        } else {
          setStreak(0);
          beep(soundTone, 180, 0.3, 0.2);
        }
        setLastResult({ won: caught, rare, coinsEarned: earned, streakAtTime: newStreak, prevStreak });
        setScreen("result");
      };

      const playAgain = () => {
        setRound((r) => r + 1);
        setScreen("game");
      };

      const goHome = () => {
        setScreen("home");
        setStreak(0);
      };

      const handleEquip = (tab, id) => {
        if (tab === "skins")       setSkinId(id);
        if (tab === "backgrounds") setBgId(id);
        if (tab === "sounds")      setSoundId(id);
        beep(soundTone, 520, 0.06);
      };

      const handleBuy = (tab, item) => {
        if (coins < item.price) return;
        setCoins((c) => c - item.price);
        setOwned((o) => {
          const next = { ...o, [tab]: new Set(o[tab]) };
          next[tab].add(item.id);
          return next;
        });
        beep(soundTone, 700, 0.1);
        handleEquip(tab, item.id);
      };

      const handleShare = async () => {
        const text = lastResult?.won
          ? `caught the mouse in Catch It For Me 🐭 (+${lastResult.coinsEarned} coins${lastResult.rare ? ", RARE!" : ""}). my cat is unimpressed.`
          : `the mouse escaped in Catch It For Me 🐭. my cat is judging me HARD.`;
        try {
          if (navigator.share) await navigator.share({ title: "Catch It For Me", text });
          else { await navigator.clipboard.writeText(text); alert("Copied result to clipboard!"); }
        } catch {}
      };

      const bg = BACKGROUNDS.find(b => b.id === bgId) || BACKGROUNDS[0];

      return (
        <div className={`app ${bg.className}`}>
          <div className="orbs" aria-hidden>
            <div className="orb a" />
            <div className="orb b" />
            <div className="orb c" />
          </div>

          {/* HUD: coins + streak */}
          {screen !== "result" && (
            <div className="top-bar">
              <span className={`pill coin-pill ${coinBump ? "bump" : ""}`}>
                🪙 <span className="count">{coins}</span>
              </span>
              {streak >= 2 && screen === "game" && (
                <span className="pill streak-pill">🔥 ×{streak}</span>
              )}
              {screen !== "game" && <span />}
            </div>
          )}

          {screen === "home" && (
            <HomeScreen skinId={skinId} coins={coins} firstEver={firstEver}
              onStart={startGame} onShop={() => setShopOpen(true)} />
          )}

          {screen === "game" && (
            <GameScreen
              key={round}
              skinId={skinId}
              roundNumber={round}
              streak={streak}
              soundTone={soundTone}
              onFinish={finishGame}
            />
          )}

          {screen === "result" && lastResult && (
            <ResultScreen
              skinId={skinId}
              won={lastResult.won}
              rare={lastResult.rare}
              coinsEarned={lastResult.coinsEarned}
              streak={lastResult.streakAtTime}
              prevStreak={lastResult.prevStreak}
              onAgain={playAgain}
              onHome={goHome}
              onShare={handleShare}
            />
          )}

          {shopOpen && (
            <ShopScreen
              coins={coins}
              skinId={skinId} bgId={bgId} soundId={soundId}
              owned={owned}
              onClose={() => setShopOpen(false)}
              onBuy={handleBuy}
              onEquip={handleEquip}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
