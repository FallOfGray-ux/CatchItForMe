    /* -------- Sound + haptics -------- */
    const audioCtxRef = { current: null };
    function beep(tone="sine", freq=660, dur=0.08, vol=0.15) {
      try {
        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtxRef.current;
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = tone; osc.frequency.value = freq; gain.gain.value = vol;
        osc.connect(gain).connect(ctx.destination); osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
        osc.stop(ctx.currentTime + dur);
      } catch {}
    }
    function haptic(pattern=12) { try { if (navigator.vibrate) navigator.vibrate(pattern); } catch {} }

    /* -------- Confetti -------- */
    function Confetti({ keySeed }) {
      const pieces = useMemo(() => {
        const colors = ["#ff2d6f", "#ffd23f", "#29e3ff", "#7b2cff", "#7ae25e", "#fff"];
        return new Array(36).fill(0).map((_, i) => {
          const angle = Math.random() * Math.PI * 2;
          const dist = 120 + Math.random() * 220;
          return {
            id: i, color: colors[i % colors.length],
            tx: `${Math.cos(angle) * dist}px`, ty: `${Math.sin(angle) * dist}px`,
            tr: `${(Math.random() * 720 - 360)}deg`, delay: `${Math.random() * 0.08}s`,
          };
        });
      }, [keySeed]);
      return <div className="confetti-wrap" key={keySeed}>
        {pieces.map(p => <span key={p.id} className="confetti"
          style={{ background:p.color, "--tx":p.tx, "--ty":p.ty, "--tr":p.tr, animationDelay:p.delay }} />)}
      </div>;
    }

    /* -------- AuthScreen (sign up / sign in) -------- */
    function AuthScreen({ onAuthed }) {

            if (!e2 && data?.session) onAuthed(data.session);

    function GameScreen({ skinId, roundNumber, streak, soundTone, onFinish }) {
      const durationMs = useMemo(() => 5000 + Math.random()*5000, [roundNumber]);
      const jumpMs = useMemo(() => clamp(1100 - roundNumber*60, 300, 1200) - Math.random()*200, [roundNumber]);
      const isRare = useMemo(() => Math.random() < 0.14, [roundNumber]);

      const [pos, setPos] = useState({ x:50, y:60 });
      const [remaining, setRemaining] = useState(durationMs);
      const [startedAt] = useState(() => performance.now());
      const [coinPop, setCoinPop] = useState(null);
      const [startMsg, setStartMsg] = useState(() => pick(isRare ? CAT_LINES.round_start_rare : CAT_LINES.round_start));
      const finishedRef = useRef(false);
      const midFiredRef = useRef(false);
      const lowFiredRef = useRef(false);

      useEffect(() => { const t = setTimeout(() => setStartMsg(null), 1800); return () => clearTimeout(t); }, []);
      const reposition = useCallback(() => setPos({ x:10+Math.random()*80, y:30+Math.random()*55 }), []);
      useEffect(() => { reposition(); const j = setInterval(reposition, jumpMs); return () => clearInterval(j); }, [jumpMs, reposition]);

      useEffect(() => {
        const tick = setInterval(() => {
          const elapsed = performance.now() - startedAt;
          const left = durationMs - elapsed;
          if (!midFiredRef.current && elapsed > durationMs*0.5) {
            midFiredRef.current = true; setStartMsg(pick(CAT_LINES.mid_round));
            setTimeout(()=>setStartMsg(null), 1500);
          }
          if (!lowFiredRef.current && left < 2000) {
            lowFiredRef.current = true; setStartMsg(pick(CAT_LINES.time_low));
            setTimeout(()=>setStartMsg(null), 1400);
          }
          if (left <= 0) {
            clearInterval(tick);
            if (!finishedRef.current) {
              finishedRef.current = true; haptic([40,60,40]);
              onFinish({ caught:false, rare:isRare });
            }
          } else setRemaining(left);
        }, 100);
        return () => clearInterval(tick);
      }, [durationMs, startedAt, onFinish, isRare]);

      const handleTap = () => {
        if (finishedRef.current) return;
        finishedRef.current = true;
        beep(soundTone, isRare?1100:880, 0.14, 0.22);
        haptic(isRare ? [10,40,10,40,20] : 25);
        setCoinPop({ x:pos.x, y:pos.y, text: isRare ? "+50" : "+10" });
        setTimeout(() => onFinish({ caught:true, rare:isRare }), 480);
      };

      const secondsLeft = Math.max(0, remaining/1000);
      const pct = clamp((remaining/durationMs)*100, 0, 100);

      return (
        <div className="screen" style={{ justifyContent:"flex-start", paddingTop:"calc(var(--pad-top) + 110px)" }}>
          <CatCharacter skinId={skinId} message={startMsg} corner streaking={streak >= 2} />
          <Mouse x={pos.x} y={pos.y} rare={isRare} onTap={handleTap} />
          {coinPop && <div className="coin-pop" style={{ left:`${coinPop.x}%`, top:`${coinPop.y}%` }}>{coinPop.text} 🪙</div>}
          <div className="timer-wrap">
            <div className={`timer-bar ${secondsLeft < 2 ? "low" : ""}`}><span style={{ width:`${pct}%` }} /></div>
          </div>
        </div>
      );
    }

    /* -------- App -------- */
    const DEFAULT_PROFILE = {
      coins: 0,
      skin_id: "default", bg_id: "basic", sound_id: "default",
      owned_skins: ["default"], owned_backgrounds: ["basic"], owned_sounds: ["default"],
      high_streak: 0, total_wins: 0, total_fails: 0,
    };

    function useProfileSync(session) {
      // Load + debounce-save the user's profile row.
      const [profile, setProfile] = useState(null);  // object or null while loading
      const [error, setError]     = useState(null);
      const saveTimer = useRef(null);

      // Load on session change
      useEffect(() => {
        let cancelled = false;
        if (!session || !supabase) { setProfile(null); return; }
        (async () => {
          try {
            const { data, error } = await supabase
              .from("profiles").select("*").eq("id", session.user.id).maybeSingle();
            if (error) throw error;
            if (cancelled) return;
            if (!data) {
              // Trigger failed (or Email provider not set). Insert manually.
              const { data: inserted, error: insErr } = await supabase
                .from("profiles").insert({ id: session.user.id }).select().single();
              if (insErr) throw insErr;
              setProfile(inserted);
            } else {
              setProfile(data);
            }
          } catch (e) {
            setError(e.message || String(e));
          }
        })();
        return () => { cancelled = true; };
      }, [session]);

      // Debounced save on every change
      const save = useCallback((patch) => {
        if (!session || !supabase) return;
        setProfile((prev) => {
          const next = { ...prev, ...patch };
          if (saveTimer.current) clearTimeout(saveTimer.current);
          saveTimer.current = setTimeout(async () => {
            try {
              const { error } = await supabase
                .from("profiles")
                .update({
                  coins: next.coins,
                  skin_id: next.skin_id, bg_id: next.bg_id, sound_id: next.sound_id,
                  owned_skins: next.owned_skins, owned_backgrounds: next.owned_backgrounds, owned_sounds: next.owned_sounds,
                  high_streak: next.high_streak, total_wins: next.total_wins, total_fails: next.total_fails,
                })
                .eq("id", session.user.id);
              if (error) setError(error.message);
            } catch (e) { setError(e.message || String(e)); }
          }, 350);
          return next;
        });
      }, [session]);

      return { profile, setProfile, save, error };
    }

    function App() {
      const [session, setSession] = useState(null);
      const [sessionLoaded, setSessionLoaded] = useState(false);

      // Boot: read existing session, subscribe to changes.
      useEffect(() => {
        if (!supabase) { setSessionLoaded(true); return; }
        supabase.auth.getSession().then(({ data }) => {
          setSession(data.session || null);
          setSessionLoaded(true);
        });
        const { data: sub } = supabase.auth.onAuthStateChange((_event, s) => setSession(s));
        return () => sub.subscription.unsubscribe();
      }, []);

      const { profile, setProfile, save, error: syncErr } = useProfileSync(session);

      const [screen, setScreen]     = useState("home");
      const [shopOpen, setShopOpen] = useState(false);
      const [round, setRound]       = useState(1);
      const [streak, setStreak]     = useState(0);
      const [lastResult, setLastResult] = useState(null);
      const [coinBump, setCoinBump] = useState(false);

      const signOut = async () => {
        await supabase.auth.signOut();
        setSession(null); setProfile(null); setScreen("home");
      };

      // If not configured, show a helpful screen
      if (!supabase) {
        return (
          <div className="app bg-haunted">
            <div className="orbs"><div className="orb a" /><div className="orb b" /><div className="orb c" /></div>
            <div className="screen">
              <h1>Setup required</h1>
              <p>Open <b>catch-it-for-me-cloud.html</b> in a text editor and paste your Supabase URL and anon key near the top of the &lt;script&gt; tag. See <b>supabase/SETUP.md</b>.</p>
            </div>
          </div>
        );
      }

      if (!sessionLoaded) return <div className="app bg-neon"><div className="loading">Loading…</div></div>;
      if (!session) return <div className="app bg-neon">
        <div className="orbs"><div className="orb a" /><div className="orb b" /><div className="orb c" /></div>
        <AuthScreen onAuthed={(s)=>setSession(s)} />
      </div>;
      if (!profile) return <div className="app bg-neon"><div className="loading">Loading your profile…{syncErr ? ` (${syncErr})` : ""}</div></div>;

      const bg = BACKGROUNDS.find(b => b.id === profile.bg_id) || BACKGROUNDS[0];
      const soundTone = (SOUND_PACKS.find(s => s.id === profile.sound_id) || SOUND_PACKS[0]).tone;

      const bumpCoins = (n) => {
        setCoinBump(true);
        setTimeout(() => setCoinBump(false), 260);
        return profile.coins + n;
      };

      const startGame = () => { beep(soundTone, 520, 0.08); setScreen("game"); };

      const finishGame = ({ caught, rare }) => {
        let earned = 0; const prevStreak = streak; let newStreak = streak;
        let patch = {};
        if (caught) {
          earned = rare ? 50 : 10;
          newStreak = streak + 1;
          if (newStreak > 1) earned += clamp((newStreak-1)*2, 0, 20);
          patch = {
            coins: bumpCoins(earned),
            total_wins: (profile.total_wins || 0) + 1,
            high_streak: Math.max(profile.high_streak || 0, newStreak),
          };
          setStreak(newStreak);
          beep(soundTone, 980, 0.15, 0.25);
        } else {
          patch = { total_fails: (profile.total_fails || 0) + 1 };
          setStreak(0);
          beep(soundTone, 180, 0.3, 0.2);
        }
        save(patch);
        setLastResult({ won:caught, rare, coinsEarned:earned, streakAtTime:newStreak, prevStreak });
        setScreen("result");
      };

      const playAgain = () => { setRound(r=>r+1); setScreen("game"); };
      const goHome = () => { setScreen("home"); setStreak(0); };

      const handleEquip = (tab, id) => {
        const key = tab === "skins" ? "skin_id" : tab === "backgrounds" ? "bg_id" : "sound_id";
        save({ [key]: id });
        beep(soundTone, 520, 0.06);
      };

      const handleBuy = (tab, item) => {
        if (profile.coins < item.price) return;
        const invKey = tab === "skins" ? "owned_skins" : tab === "backgrounds" ? "owned_backgrounds" : "owned_sounds";
        const equipKey = tab === "skins" ? "skin_id" : tab === "backgrounds" ? "bg_id" : "sound_id";
        const newInv = profile[invKey].includes(item.id) ? profile[invKey] : [...profile[invKey], item.id];
        save({ coins: profile.coins - item.price, [invKey]: newInv, [equipKey]: item.id });
        beep(soundTone, 700, 0.1);
      };

      const handleShare = async () => {
        const text = lastResult?.won
          ? `caught the mouse in Catch It For Me 🐭 (+${lastResult.coinsEarned} coins${lastResult.rare ? ", RARE!" : ""}). my cat is unimpressed.`
          : `the mouse escaped in Catch It For Me 🐭. my cat is judging me HARD.`;
        try {
          if (navigator.share) await navigator.share({ title:"Catch It For Me", text });
          else { await navigator.clipboard.writeText(text); alert("Copied result to clipboard!"); }
        } catch {}
      };

      // Rebuild owned sets from arrays (shop needs Set)
      const ownedSets = {
        skins:       new Set(profile.owned_skins),
        backgrounds: new Set(profile.owned_backgrounds),
        sounds:      new Set(profile.owned_sounds),
      };

      return (
        <div className={`app ${bg.className}`}>
          <div className="orbs"><div className="orb a" /><div className="orb b" /><div className="orb c" /></div>

          {screen !== "result" && (
            <div className="top-bar">
              <span className={`pill coin-pill ${coinBump ? "bump" : ""}`}>🪙 <span className="count">{profile.coins}</span></span>
              {streak >= 2 && screen === "game" && <span className="pill streak-pill">🔥 ×{streak}</span>}
              {screen !== "game" && <span />}
            </div>
          )}

          {screen === "home" && <button className="sign-out" onClick={signOut}>Sign out</button>}

          {screen === "home" && (
            <HomeScreen skinId={profile.skin_id} onStart={startGame} onShop={()=>setShopOpen(true)}
              firstEver={profile.total_wins === 0 && profile.total_fails === 0} />
          )}
          {screen === "game" && (
            <GameScreen key={round} skinId={profile.skin_id} roundNumber={round} streak={streak}
              soundTone={soundTone} onFinish={finishGame} />
          )}
          {screen === "result" && lastResult && (
            <ResultScreen skinId={profile.skin_id}
              won={lastResult.won} rare={lastResult.rare}
              coinsEarned={lastResult.coinsEarned} streak={lastResult.streakAtTime} prevStreak={lastResult.prevStreak}
              onAgain={playAgain} onHome={goHome} onShare={handleShare} />
          )}
          {shopOpen && (
            <ShopScreen coins={profile.coins}
              skinId={profile.skin_id} bgId={profile.bg_id} soundId={profile.sound_id}
              owned={ownedSets} onClose={()=>setShopOpen(false)}
              onBuy={handleBuy} onEquip={handleEquip} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
